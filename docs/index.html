<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Fluid Simulation" />
    <title>Fluid Simulation</title>
    <link rel="stylesheet" href="style.css" />

    <!-- KaTeX (https://katex.org/docs/browser) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.css"
      integrity="sha384-UA8juhPf75SzzAMA/4fo3yOU7sBJ0om7SCD2GHq0fZqZco6tr1UCV7nUbk9J90JM"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.js"
      integrity="sha384-Tt7wBxLKwSzFVRET4O4U9H6v8MNaQ/CjN2FMP4xFm0ErrFu6aNqoonRVW5W40iGI"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/contrib/auto-render.min.js"
      integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz"
      crossorigin="anonymous"
      onload="renderMathInElement(document.body)"
    ></script>
  </head>
  <body>
    <div id="output">
      <canvas id="canvas" onmousemove="onCanvasMouseMove(this, event);"></canvas>
    </div>
    <div id="control">
      <header>
        <h1>Fluid Simulation</h1>
        <div>
          <a href="https://github.com/krswm/lbm">Repository on GitHub</a>
        </div>
      </header>

      <div class="box">
        <button onclick="onResetButtonClick();">Restart</button>
        <button id="toggleButton" onclick="onToggleButtonClick();">Play</button>
      </div>

      <div class="box">
        <div id="N">
          <div>Size</div>
          <div>\(N =\)</div>
          <input id="widthInput" type="number" value="200" />
          <div>\(\times\)</div>
          <input id="heightInput" type="number" value="40" />
        </div>
      </div>

      <div class="box">
        <h2>Boundary Condition</h2>
        <label>
          Viscosity <span class="math">ν</span>
          <br>
          Please do not make it too small!
          <input id="viscosityInput" type="number" value="0.005" step="0.001" />
        </label>
        <label>
          Speed of fluid flowing from the left side
          <span class="math">U</span>
          <br>
          Please do not make it too large!
          <input id="speedInput" type="number" value="0.1" step="0.01" />
        </label>
        <div>
          <p>Density <span class="math">ρ</span></p>
          <p>1</p>
        </div>
      </div>

      <div class="box">
        <h2>Barrier</h2>
        <label>
          Shape
          <select id="wallShape">
            <option value="circle">Circle</option>
            <option value="bar">Bar</option>
            <option value="square">Square</option>
          </select>
        </label>

        <div class="number-input">
          <div>\(x\) position</div>
          <input id="wallXInput" type="number" value="20" />
        </div>

        <div class="number-input">
          <div>\(y\) position</div>
          <input id="wallYInput" type="number" value="20" />
        </div>

        <div class="number-input">
          <div>Length</div>
          <input id="wallDiameterInput" type="number" value="10" />
        </div>
      </div>

      <div class="box">
        <h2>Observation</h2>
        <label>
          x position
          <input id="probeXInput" type="number" value="150" />
        </label>
        <label>
          y position
          <input id="probeYInput" type="number" value="20" />
        </label>
        <label>
          Observe until this steps
          <input id="maxStepInput" type="number" value="100000" step="10000" />
        </label>
        <div>
          <button id="exportButton" disabled onclick="simulator.export();">
          </button>
          <a id="exportA"></a>
        </div>
      </div>

      <div class="box">
        <h2>Visualization</h2>
        <label>
          Coloring
          <select id="drawMethod">
            <option value="curl">Curl</option>
            <option value="velocity">Velocity</option>
            <option value="density">Density</option>
          </select>
        </label>
        <label>
          Intensity
          <input id="intensityInput" type="number" value="1" />
        </label>
        <img src="legend.svg" alt="Legend"></img>
      </div>

      <div class="box">
        <div>
          <p>Steps</p>
          <p id="stepP">0</p>
        </div>
        <div>
          <p>Mouse position</p>
          <p id="mouseP">(0, 0)</p>
        </div>
        <div>
          <p>
            Reynolds number
            Re = <span class="math">UL</span>/<span class="math">ν</span>
          </p>
          <p id="reynoldsP"></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
